# CI/CD Pipeline для CafeBoard
# Триггеры: push и pull_request в ветку main

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ──────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────
jobs:
  # ─── Тесты бэкенда ──────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Установка зависимостей
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Запуск тестов (pytest)
        working-directory: ./backend
        run: |
          pytest --tb=short -v

  # ─── Тесты фронтенда ────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установка Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Установка зависимостей
        working-directory: ./frontend
        run: npm ci

      - name: Сборка приложения
        working-directory: ./frontend
        run: npm run build

  # ─── Docker-сборка ──────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка backend-образа
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: cafeboard-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Сборка frontend-образа (production)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: cafeboard-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
