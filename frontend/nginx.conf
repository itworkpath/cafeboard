# Конфигурация nginx для CafeBoard Frontend
# Проксирование API и WebSocket на backend, SPA fallback

server {
    listen 80;
    server_name localhost;

    # ──────────────────────────────────────────
    # Gzip-сжатие
    # ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ──────────────────────────────────────────
    # Корневая директория и индексный файл
    # ──────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────
    # Проксирование API-запросов на backend
    # ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ──────────────────────────────────────────
    # Проксирование WebSocket-соединений
    # ──────────────────────────────────────────
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ──────────────────────────────────────────
    # Кэширование статики
    # ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # ──────────────────────────────────────────
    # SPA fallback — все остальные маршруты на index.html
    # ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ──────────────────────────────────────────
    # Запрет доступа к скрытым файлам
    # ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
